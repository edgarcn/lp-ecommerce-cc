services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Host 3307 → container 3306, so it won't clash with a local MySQL on 3306.
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./ecommerce-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=true;"
      Auth__JwtSecret: ${AUTH_JWT_SECRET}
      Auth__JwtIssuer: ecommerce-api
      Auth__JwtAudience: ecommerce-webapp
      Auth__AdminUsername: ${AUTH_ADMIN_USERNAME}
      Auth__AdminPasswordHash: ${AUTH_ADMIN_PASSWORD_HASH}
      AllowedOrigins__0: ${WEB_ORIGIN}
      # HTTPS hardening stays off for the local HTTP demo (see README "Security").
      Security__RequireHttps: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Uncomment to hit the API directly for debugging (host 5048 → container 8080):
    # ports:
    #   - "5048:8080"

  web:
    build:
      context: ./lp-ecommerce
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
