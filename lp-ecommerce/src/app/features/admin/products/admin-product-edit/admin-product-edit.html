<a routerLink="/admin/products" class="back">← Back to products</a>

@if (loading()) {
  <p class="admin-status">Loading…</p>
} @else if (notFound()) {
  <p class="admin-status">Product not found.</p>
} @else if (product(); as p) {
  <div class="edit-head">
    <h1>Edit Product</h1>
    <span class="ids">#{{ p.productId }} · SKU {{ p.sku }}</span>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="edit-card">
    <div class="readonly-row">
      <div class="ro">
        <span class="ro-label">Product ID</span>
        <span class="ro-value">#{{ p.productId }}</span>
      </div>
      <div class="ro">
        <span class="ro-label">SKU</span>
        <span class="ro-value">{{ p.sku }}</span>
      </div>
      <div class="ro">
        <span class="ro-label">Status</span>
        <span class="ro-value status-active">{{ p.active ? 'Active' : 'Inactive' }}</span>
      </div>
    </div>

    <div class="field">
      <label>Name <span class="required">*</span></label>
      <input type="text" formControlName="name" maxlength="200" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea formControlName="description" rows="3" maxlength="2500"></textarea>
    </div>

    <div class="field">
      <label>Category <span class="required">*</span></label>
      <input type="text" formControlName="category" maxlength="100" />
    </div>

    <div class="row">
      <div class="field">
        <label>Price (USD) <span class="required">*</span></label>
        <input type="number" formControlName="price" min="0" step="0.01" />
      </div>
      <div class="field">
        <label>Stock <span class="required">*</span></label>
        <input type="number" formControlName="stock" min="0" step="1" />
      </div>
      <div class="field">
        <label>Weight (kg) <span class="required">*</span></label>
        <input type="number" formControlName="weightKg" min="0" step="0.01" />
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-delete" [disabled]="deactivating()" (click)="deactivate()">
        🗑 {{ deactivating() ? 'Deactivating…' : 'Delete (Deactivate)' }}
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : 'Save Changes' }}
      </button>
    </div>
  </form>
}
