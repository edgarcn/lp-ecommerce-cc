<section class="container complete">
  <div class="check">✓</div>
  <h1>Order Confirmed!</h1>
  <p class="subtitle">Thank you for your purchase. A confirmation has been sent to your email.</p>

  <div class="order-box">
    <span class="muted">Your order number</span>
    <span class="order-id">#{{ orderId }}</span>
    <span class="hint">Keep this number to check your order status later.</span>
  </div>

  <a routerLink="/" class="btn btn-primary">Continue Shopping</a>
</section>
