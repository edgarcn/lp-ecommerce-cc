<a class="card" [routerLink]="['/products', product().productId]">
  <div class="media">
    <app-product-image [name]="product().name" [seed]="product().productId" />
  </div>
  <div class="body">
    <span class="category">{{ product().category }}</span>
    <h3 class="name">{{ product().name }}</h3>
    <span class="price">{{ product().price | currency }}</span>

    @if (product().currentStock > 0) {
      <button class="btn btn-soft block" (click)="addToCart($event)">
        🛒 Add to Cart
      </button>
    } @else {
      <button class="btn btn-soft block" disabled>Out of stock</button>
    }
  </div>
</a>
